<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comptes Utilisateurs - Console Admin - ELEC TECH</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { customOrange: '#FF8C00' }
                }
            }
        }
    </script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="../javascript/api.js"></script>
    <script>
        // Simple Auth Check
        if (sessionStorage.getItem('admin_unlocked') !== 'true') {
            window.location.href = 'admin_publish.html';
        }
    </script>
</head>
<body class="bg-black text-gray-300 font-sans min-h-screen flex flex-col selection:bg-customOrange selection:text-black">

    <header class="p-6 border-b border-gray-800 backdrop-blur-sm bg-black/80 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-6">
                <a href="admin_publish.html" class="text-gray-400 hover:text-customOrange transition-colors text-sm font-bold flex items-center gap-2">
                    <i class="fas fa-arrow-left"></i> Tableau de bord
                </a>
                <a href="../index.html" class="text-2xl font-bold text-white tracking-widest hover:scale-105 transition-transform inline-block">
                    <i class="fas fa-bolt text-customOrange mr-2"></i>ELEC<span class="text-customOrange">TECH</span>
                </a>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-customOrange font-black tracking-widest uppercase border border-customOrange/30 bg-customOrange/10 px-4 py-1.5 rounded-full text-xs">
                    <i class="fas fa-shield-alt mr-1"></i> Mode Admin
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-start p-6 py-12">
        <!-- User Accounts Panel -->
        <div class="w-full max-w-4xl bg-gray-900 border border-gray-800 rounded-3xl p-8 md:p-10 shadow-2xl mt-8 mb-12">
            <h2 class="text-2xl font-black text-white mb-2 flex items-center">
                <i class="fas fa-users text-customOrange mr-4 animate-pulse"></i> Comptes Utilisateurs
                <span id="users-count-badge" class="ml-4 text-xs bg-customOrange/10 border border-customOrange/30 text-customOrange px-3 py-1 rounded-full font-bold">0 membres</span>
            </h2>
            <p class="text-gray-600 text-xs mb-6">Comptes inscrits via la page d’inscription du site.</p>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse text-sm">
                    <thead>
                        <tr class="bg-black/50 text-gray-400 border-b border-gray-800">
                            <th class="p-4 font-bold uppercase tracking-widest text-xs">Date</th>
                            <th class="p-4 font-bold uppercase tracking-widest text-xs">Nom</th>
                            <th class="p-4 font-bold uppercase tracking-widest text-xs">Email</th>
                            <th class="p-4 font-bold uppercase tracking-widest text-xs">Rôle / Secteur</th>
                            <th class="p-4 font-bold uppercase tracking-widest text-xs">Statut</th>
                            <th class="p-4 font-bold uppercase tracking-widest text-xs text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody" class="text-gray-300">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderUsers();
        });

        function renderUsers() {
            const users = JSON.parse(localStorage.getItem('electech_users') || '[]');
            const tbody = document.getElementById('usersTableBody');
            const badge = document.getElementById('users-count-badge');
            
            if(badge) badge.textContent = `${users.length} membre${users.length > 1 ? 's' : ''}`;
            if(!tbody) return;
            if(users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-8 text-center text-gray-700 italic text-xs uppercase tracking-widest"><i class="fas fa-ghost text-3xl block mb-3 opacity-30"></i>Aucun compte utilisateur enregistré.</td></tr>';
                return;
            }
            const roleColors = {
                'Etudiant': 'text-blue-400 bg-blue-500/10 border-blue-500/30',
                'Technicien': 'text-green-400 bg-green-500/10 border-green-500/30',
                'Ingenieur': 'text-purple-400 bg-purple-500/10 border-purple-500/30',
                'Recruteur': 'text-yellow-400 bg-yellow-500/10 border-yellow-500/30',
                'admin': 'text-customOrange bg-customOrange/10 border-customOrange/30'
            };
            tbody.innerHTML = users.map((u, i) => {
                const roleClass = roleColors[u.role] || 'text-gray-400 bg-gray-800 border-gray-700';
                const isSuspended = u.status === 'suspendu';
                const statusBadge = isSuspended
                    ? '<span class="text-red-500 text-[10px] font-bold border border-red-500/30 bg-red-500/10 px-2 py-0.5 rounded uppercase tracking-wider">Suspendu</span>'
                    : '<span class="text-green-500 text-[10px] font-bold border border-green-500/30 bg-green-500/10 px-2 py-0.5 rounded uppercase tracking-wider">Actif</span>';
                return `
                <tr class="border-b border-gray-800/30 hover:bg-gray-800/40 transition-colors group ${isSuspended ? 'opacity-50' : ''}">
                    <td class="p-4 font-mono text-[10px] text-gray-500"><i class="far fa-calendar mr-1"></i>${u.date || 'N/A'}</td>
                    <td class="p-4 text-xs text-white font-bold"><i class="fas fa-user-circle text-blue-400 mr-2"></i>${u.name || '---'}</td>
                    <td class="p-4 text-xs text-gray-400">${u.email}</td>
                    <td class="p-4"><span class="text-[10px] font-bold border px-2 py-0.5 rounded uppercase tracking-wider ${roleClass}">${u.role || 'N/A'}</span></td>
                    <td class="p-4">${statusBadge}</td>
                    <td class="p-4 text-right flex justify-end gap-1">
                        <button onclick="toggleUserStatus(${i})" class="${isSuspended ? 'text-green-400 bg-green-900/20 hover:bg-green-600' : 'text-yellow-400 bg-yellow-900/20 hover:bg-yellow-600'} hover:text-white text-xs w-8 h-8 flex items-center justify-center rounded-lg transition-all" title="${isSuspended ? 'Réactiver' : 'Suspendre'}">
                            <i class="fas ${isSuspended ? 'fa-unlock' : 'fa-ban'}"></i>
                        </button>
                        <button onclick="deleteUser(${i})" class="text-red-500 hover:text-white text-xs w-8 h-8 flex items-center justify-center rounded-lg bg-red-900/20 hover:bg-red-600 transition-all" title="Supprimer définitivement">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function deleteUser(index) {
            if(!confirm('⚠️ Supprimer définitivement ce compte utilisateur ?')) return;
            const users = JSON.parse(localStorage.getItem('electech_users') || '[]');
            users.splice(index, 1);
            localStorage.setItem('electech_users', JSON.stringify(users));
            renderUsers();
        }

        function toggleUserStatus(index) {
            const users = JSON.parse(localStorage.getItem('electech_users') || '[]');
            if(!users[index]) return;
            users[index].status = users[index].status === 'suspendu' ? 'actif' : 'suspendu';
            localStorage.setItem('electech_users', JSON.stringify(users));
            renderUsers();
        }
    </script>
</body>
</html>
